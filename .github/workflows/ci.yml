name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Build + Vet + Race Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install C toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Race test
        run: go test -race -count=1 -timeout 300s ./...

      - name: Bench (smoke)
        run: go test -bench=. -benchmem -run='^$' -benchtime=1x ./...
